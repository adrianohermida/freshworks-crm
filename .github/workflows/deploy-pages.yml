name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["main", "master", "work"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Ensure .nojekyll in src artifact
        run: touch src/.nojekyll

      - name: Verify required static files
        run: |
          test -f src/index.html
          test -f src/main.js
          test -f src/App.js
          test -f src/Layout.js
          test -f src/index.css
          test -f src/globals.css

      - name: Upload artifact from src/
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./src

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
