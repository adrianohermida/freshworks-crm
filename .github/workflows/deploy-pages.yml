name: Deploy static site to GitHub Pages

on:
  push:
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Verify required src files
        run: |
          test -f src/index.html
          test -f src/main.js
          test -f src/App.js
          test -f src/Layout.js
          test -f src/index.css
          test -f src/globals.css
          test -f src/pages/home.js

      - name: Build Pages artifact from src/
        run: |
          rm -rf _site
          mkdir -p _site/pages
          cp src/index.html _site/index.html
          cp src/main.js _site/main.js
          cp src/App.js _site/App.js
          cp src/Layout.js _site/Layout.js
          cp src/index.css _site/index.css
          cp src/globals.css _site/globals.css
          cp src/sql-server-setup.sql _site/sql-server-setup.sql
          cp src/pages/home.js _site/pages/home.js
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
